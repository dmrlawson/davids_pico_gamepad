name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        board: [pico_w, pico2_w]

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: Check out Pico SDK
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: '2.2.0'
          path: pico-sdk
          submodules: true

      - name: Build
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
        run: |
          mkdir build && cd build
          cmake -DPICO_BOARD=${{ matrix.board }} -DPROJECT_VERSION=${{ github.ref_name }} -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)
          cp davids_pico_gamepad.uf2 davids_pico_gamepad-${{ matrix.board }}-${{ github.ref_name }}.uf2

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: build/davids_pico_gamepad-${{ matrix.board }}-${{ github.ref_name }}.uf2
          name: ${{ github.ref_name }}
